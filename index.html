<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>BallsDex Spawn Commander V2</title>

  <!-- Fonts: Space Grotesk (UI) + Space Mono (clock/code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bd: {
              '0':  '#07080A',
              '1':  '#0E0F14',
              '2':  '#14151C',
              '3':  '#1B1C25',
              '4':  '#22232F',
            }
          },
          fontFamily: {
            sans: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            mono: ['"Space Mono"', 'monospace'],
          }
        }
      }
    };
  </script>

  <!-- React 18 + Babel (JSX transform, no build step) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Design tokens ──────────────────────────────────────────── */
    :root {
      --bg:          #04040A;
      --s0:          rgba(255,255,255,0.03);
      --s1:          rgba(255,255,255,0.055);
      --s2:          rgba(255,255,255,0.09);
      --border:      rgba(255,255,255,0.09);
      --border-hi:   rgba(255,255,255,0.16);
      --violet:      #8B5CF6;
      --violet-dim:  rgba(139,92,246,0.18);
      --indigo:      #6366F1;
      --indigo-dim:  rgba(99,102,241,0.15);
      --cyan:        #22D3EE;
      --cyan-dim:    rgba(34,211,238,0.12);
      --emerald:     #10B981;
      --emerald-dim: rgba(16,185,129,0.15);
      --amber:       #F59E0B;
      --amber-dim:   rgba(245,158,11,0.15);
      --orange:      #F97316;
      --rose:        #F43F5E;
      --text:        #F1F5F9;
      --fg2:         #CBD5E1;
      --sec:         #94A3B8;
      --muted:       #475569;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Aurora background orbs */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 45% 55% at 8% 12%,  rgba(139,92,246,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 40% 50% at 90% 82%,  rgba(34,211,238,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 30% 38% at 78% 8%,   rgba(244,63,94,0.09)  0%, transparent 55%),
        radial-gradient(ellipse 35% 40% at 50% 110%, rgba(99,102,241,0.12) 0%, transparent 60%);
      animation: auroraFloat 18s ease-in-out infinite alternate;
    }
    @keyframes auroraFloat {
      0%   { transform: scale(1)    translate(0, 0); }
      100% { transform: scale(1.07) translate(8px, -14px); }
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      opacity: 0.028;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 2px; }

    /* Glass surfaces */
    .glass  { background: rgba(10,10,20,0.55); border: 1px solid var(--border); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .glass2 { background: rgba(12,12,22,0.72); border: 1px solid var(--border-hi); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }

    /* Inputs & selects */
    .inp {
      display: block; width: 100%;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 13px;
      color: var(--text); font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .inp::placeholder { color: var(--muted); }
    .inp:focus { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px rgba(99,102,241,0.08); }
    select.inp { cursor: pointer; background-color: #1B1C25; color: #F1F5F9; }
    select.inp option { background-color: #1B1C25; color: #F1F5F9; }

    /* ── Base button ────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-family: inherit; font-weight: 600; border-radius: 12px;
      border: 1px solid transparent; cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.15s ease, opacity 0.15s;
      outline: none; position: relative; overflow: hidden;
    }
    .btn:focus-visible { outline: 2px solid var(--indigo); outline-offset: 2px; }

    /* Ripple */
    .btn .ripple {
      position: absolute; border-radius: 50%;
      transform: scale(0); background: rgba(255,255,255,0.18);
      animation: rippleAnim 0.55s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* ── CAUGHT button ──────────────────────────────────────────── */
    .btn-caught {
      background: linear-gradient(135deg, #047857 0%, #059669 25%, #10B981 60%, #34D399 85%, #6EE7B7 100%);
      border: 1px solid rgba(52,211,153,0.35) !important;
      box-shadow: 0 4px 24px rgba(16,185,129,0.4), 0 0 48px rgba(16,185,129,0.12), 0 1px 0 rgba(255,255,255,0.15) inset;
      color: white;
      letter-spacing: 0.03em;
    }
    .btn-caught::after {
      content: ''; position: absolute; top: 0; left: -110%; width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      animation: shimmer 2.4s ease-in-out infinite;
    }
    .btn-caught:hover {
      box-shadow: 0 8px 40px rgba(16,185,129,0.6), 0 0 60px rgba(16,185,129,0.18), 0 1px 0 rgba(255,255,255,0.18) inset;
      transform: translateY(-3px);
    }
    .btn-caught:active { transform: scale(0.96) translateY(0) !important; }

    /* ── MISS button ────────────────────────────────────────────── */
    .btn-miss {
      background: rgba(249,115,22,0.07);
      border: 1px solid rgba(249,115,22,0.22) !important;
      color: #FB923C;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .btn-miss:hover {
      background: rgba(249,115,22,0.14);
      box-shadow: 0 0 22px rgba(249,115,22,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
      transform: translateY(-1px);
    }
    .btn-miss:active { transform: scale(0.96) !important; }

    /* ── Ghost / secondary button ───────────────────────────────── */
    .btn-ghost {
      background: var(--s1);
      border: 1px solid var(--border) !important;
      color: var(--muted);
    }
    .btn-ghost:hover { background: var(--s2); color: var(--text); transform: translateY(-1px); }
    .btn-ghost:active { transform: scale(0.96) !important; }

    /* ── Copy button ────────────────────────────────────────────── */
    .btn-copy {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09) !important;
      color: #94A3B8; font-size: 12px;
    }
    .btn-copy:hover { background: rgba(255,255,255,0.09); color: #F1F5F9; transform: translateY(-1px); }
    .btn-copy.copied {
      background: rgba(16,185,129,0.15);
      border-color: rgba(16,185,129,0.3) !important;
      color: #34D399;
    }
    .btn-copy:active { transform: scale(0.95) !important; }

    /* ── Toggle switch ──────────────────────────────────────────── */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      background: var(--s1); border: 1px solid var(--border);
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .toggle-row:hover { background: var(--s2); }
    .toggle-track {
      width: 34px; height: 19px; border-radius: 10px; position: relative;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle-track.on  { background: var(--emerald); box-shadow: 0 0 10px rgba(16,185,129,0.35); }
    .toggle-track.off { background: rgba(255,255,255,0.1); }
    .toggle-thumb {
      position: absolute; top: 2px; width: 15px; height: 15px;
      border-radius: 50%; background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      transition: left 0.25s cubic-bezier(0.68,-0.55,0.27,1.55);
    }
    .toggle-track.on  .toggle-thumb { left: 17px; }
    .toggle-track.off .toggle-thumb { left: 2px; }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes shimmer    { 0% { left:-110%; } 100% { left:200%; } }
    @keyframes slideUp    { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideRight { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
    @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
    @keyframes primePulse { 0%,100% { opacity:.04; } 50% { opacity:.09; } }
    @keyframes trigPulse  { 0%,100% { opacity:.05; } 50% { opacity:.12; } }
    @keyframes ringPulse  { 0%,100% { box-shadow:0 0 0 0 rgba(16,185,129,.5); } 50% { box-shadow:0 0 0 16px rgba(16,185,129,0); } }
    @keyframes gradRing   { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
    @keyframes pulseDot   { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(1.6); } }
    @keyframes barShimmer { 0% { transform:translateX(-100%); } 100% { transform:translateX(300%); } }
    @keyframes sentIn     { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes countIn    { from { opacity:0; transform:translateY(-6px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

    .anim-slide-up    { animation: slideUp    0.28s cubic-bezier(0.16,1,0.3,1); }
    .anim-slide-right { animation: slideRight 0.28s cubic-bezier(0.16,1,0.3,1); }
    .anim-fade-in     { animation: fadeIn     0.2s  ease-out; }
    .anim-sent        { animation: sentIn     0.35s cubic-bezier(0.16,1,0.3,1); }
    .anim-count       { animation: countIn    0.2s  ease-out; }

    /* Phase ambient glows */
    .phase-prime-bg::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 70%, rgba(245,158,11,.28), transparent),
        radial-gradient(ellipse 40% 30% at 20% 30%, rgba(249,115,22,.12), transparent);
      animation: primePulse 3s ease-in-out infinite;
    }
    .phase-trig-bg::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 70%, rgba(16,185,129,.26), transparent),
        radial-gradient(ellipse 35% 28% at 80% 20%, rgba(34,211,238,.14), transparent);
      animation: trigPulse 2s ease-in-out infinite;
    }

    /* Triggering card ring */
    .trig-ring { animation: ringPulse 1.6s ease-in-out infinite; position: relative; }
    .trig-ring::before {
      content: ''; position: absolute; inset: -1px; border-radius: inherit; z-index: -1;
      background: linear-gradient(135deg, #10B981, #34D399, #6EE7B7, #10B981);
      background-size: 300% 300%;
      animation: gradRing 3s ease infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; padding: 1px;
    }

    /* Phase dot indicator */
    .phase-dot { display:inline-block; width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .phase-dot.pulsing { animation: pulseDot 1.8s ease-in-out infinite; }

    /* Progress bar shimmer overlay */
    .bar-fill { position: relative; overflow: hidden; }
    .bar-fill::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
      animation: barShimmer 2.2s ease-in-out infinite;
    }

    /* Card hover lift */
    .card-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-lift:hover { transform: translateY(-1px); box-shadow: 0 8px 40px rgba(0,0,0,0.35); }

    /* Section label accent */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 10px;
    }
    .section-label::before {
      content: ''; display: block; width: 18px; height: 2px;
      border-radius: 1px; flex-shrink: 0;
      background: linear-gradient(90deg, var(--violet), var(--cyan));
      box-shadow: 0 0 6px rgba(139,92,246,0.6);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    /* ═══════════════════════════════════════════════════════════════
       CONSTANTS
    ═══════════════════════════════════════════════════════════════ */
    const PRIMING_START    = 720;
    const TRIGGERING_START = 900;
    const LS_KEY           = 'bdx-v2';
    const LS_COLLECTION    = 'bdx-coll';
    const CMDS             = ['/balls list', '/balls completion', '/balls info'];
    const randCmdInterval  = () => 900 + Math.floor(Math.random() * 900); // 15–30 min in seconds

    /* ═══════════════════════════════════════════════════════════════
       SENTENCE ENGINE — fully generative, infinite unique output
    ═══════════════════════════════════════════════════════════════ */
    const _SENT_USED = new Set(); // prevent short-run repeats

    const _W = {
      device:   ['router','Bluetooth speaker','USB-C cable','printer','phone charger','laptop','wireless mouse','smart plug','HDMI cable','charging pad','monitor','webcam','external hard drive','smart bulb','mechanical keyboard','trackpad','docking station','smart TV','power bank','streaming stick','noise-canceling headphones','graphics tablet','mesh router','smart display'],
      app:      ['food delivery app','navigation app','weather app','parking app','airline app','banking app','fitness tracker','streaming service','password manager','calendar app','email client','video call platform','note-taking app','cloud backup service','expense report tool','loyalty rewards app','project management tool','grocery delivery service','ride-share app','hotel booking app'],
      kitchen:  ['microwave','toaster','coffee maker','blender','air fryer','instant pot','dishwasher','electric kettle','rice cooker','stand mixer','espresso machine','toaster oven','smart oven','sous vide device','ice maker'],
      grocery:  ['self-checkout kiosk','express lane','scan-and-go terminal','produce scale','loyalty card reader','price-check station','automated receipt printer'],
      place:    ['the airport','the coffee shop','the coworking space','the gym','the hotel room','the conference room','the waiting room','the parking structure','the office kitchen','the elevator lobby','the pharmacy'],
      transit:  ['bus','train','rideshare','subway','tram','ferry'],
      person:   ['person who asks a question answered two slides earlier','person who replies-all with a single word of agreement','person who microwaves fish at eleven in the morning','person who books the conference room and leaves without canceling','person who explains things no one requested an explanation for','person who joins eight minutes late with elaborate context','person who schedules a meeting to discuss scheduling future meetings','person who responds to every email within four seconds at all hours'],
      social:   ['reply-all email chains','mandatory wellness check-ins','passive-aggressive signage in shared spaces','optional-but-recorded team events','the unannounced desk visit','ambient competitive busyness','the birthday cake protocol','the group chat that benefits no one specifically','the standing desk discourse','the open-plan silence norms','the kitchen hierarchy','unsolicited dietary commentary'],
      fail:     ['disconnected','froze','overheated','started a background update','beeped without a documented reason','lost the connection','stopped responding','restarted without warning','drained entirely','refused to sync','displayed an error I had not encountered before','connected to the wrong device','emitted a sound I cannot categorize','required a reboot to return to baseline'],
      timing:   ['a critical video call','the one deadline that mattered','dinner','the only quiet stretch of the day','a live demonstration','the final ten minutes of something important','a point of no return in the process','a conversation I could not pause','exactly when I needed it most','a presentation I could not restart'],
      reaction: ['I have not recovered emotionally','I consider this still unresolved','I have accepted it as a recurring feature','I am still processing it','I have adjusted my expectations permanently in this direction','I respect the consistency if not the outcome','I have added it to a list I now maintain','I have reached a state of informed resignation'],
      duration: ['eight months','a year and a half','six weeks','three years','fourteen months','well over a year','longer than I would like to admit','the entire time I have owned it'],
      setting:  ['setting','mode','preset','option','function','configuration'],
      count:    ['three','four','five','six','seven','eight'],
      outcome:  ['identical results I cannot distinguish','outcomes I would describe the same way','results that suggest the range is aspirational rather than functional'],
      appDid:   ['sent a notification for an event that had already concluded','required reverification for a transaction I make every month','rerouted me four times in six minutes','recommended content I had explicitly dismissed','removed a feature I used daily in an update described as minor','asked me to rate the experience before the experience was complete','marked an item available and then unavailable within the same session','sent a summary of an activity I did not perform','notified me of a change I had already discovered by encountering it','offered a discount that would have resolved my cancellation if shown at any prior point'],
      transit_did: ['arrived eleven minutes early','departed before the scheduled time','showed two minutes away for nineteen minutes','ceased location updates at the most relevant moment','skipped my stop without acknowledgment','added an unscheduled stop between my origin and destination'],
      loop_doc: ['a document I can only obtain by submitting a form that requires it','information only available after completing the process it is required to begin','a verification step that requires the account I am trying to create'],
      feature:  ['a delay timer I have never used','a setting I have read about and remain cautious about','a function I discovered by accident and have not been able to re-trigger','an option that the manual describes as advanced without clarifying the baseline'],
    };

    const _p = k => _W[k][Math.floor(Math.random() * _W[k].length)];
    const _cap = s => s.charAt(0).toUpperCase() + s.slice(1);

    // Template library — functions so each call draws fresh words
    const _TEMPLATES = {
      small: [
        () => `My ${_p('device')} ${_p('fail')} during ${_p('timing')} and ${_p('reaction')}.`,
        () => `The ${_p('app')} ${_p('appDid')} and I am filing this under things to revisit.`,
        () => `${_cap(_p('social'))} is something I participated in without fully understanding and have not stopped thinking about since.`,
        () => `My ${_p('kitchen')} made a sound this morning that I have decided to accept as a personality trait rather than investigate.`,
        () => `The ${_p('grocery')} experience was ${_p('reaction').replace('I ', 'something ')} and I am still processing it.`,
        () => `I have used my ${_p('kitchen')} for ${_p('duration')} and discovered ${_p('feature')} last week.`,
        () => `My ${_p('transit')} ${_p('transit_did')} and the app had no position on any of this.`,
        () => `${_cap(_p('place'))} had exactly one outlet near a useful surface and someone had found it before me.`,
        () => `My ${_p('device')} has ${_p('count')} ${_p('setting')}s and I have made a decision about each of them that I stand by.`,
        () => `The ${_p('app')} ${_p('appDid')}, which I found accurate but poorly sequenced.`,
        () => `There is a ${_p('person')} and I have met them in multiple contexts I would not have expected.`,
        () => `My ${_p('device')} connects to the wrong device consistently and I have adjusted my workflow around this without resolving it.`,
        () => `The ${_p('kitchen')} has ${_p('feature')} and I am not ready to engage with it.`,
        () => `I declined the ${_p('app')} notification permission once and it has asked again every session since.`,
        () => `My ${_p('device')} ${_p('fail')} and then recovered as though nothing had occurred, and I found that harder to process than the failure.`,
        () => `The ${_p('grocery')} process has been optimized at every visible stage except the one I am currently at.`,
        () => `${_cap(_p('place'))} listed every amenity I needed except one, which I confirmed after a thorough search.`,
        () => `Someone brought ${pick(['a scented candle','a Bluetooth speaker','a very loud lunch','a standing fan that requires context'])} to the shared workspace and nobody addressed it directly.`,
        () => `My ${_p('app')} sent me ${_p('count')} notifications today about things that had already resolved themselves.`,
        () => `The ${_p('transit')} app showed my arrival time updating in real time in a direction I found surprising.`,
      ],
      medium: [
        () => `The fact that my ${_p('device')} ${_p('fail')} during ${_p('timing')} is not something I will categorize as routine from a device I have maintained without incident for ${_p('duration')}.`,
        () => `My ${_p('kitchen')} has ${_p('count')} ${_p('setting')}s, ${pick(['two','three'])} of which produce ${_p('outcome')}, one I use, and ${_p('feature')} I am treating as a future consideration.`,
        () => `There is a ${_p('person')} and I have encountered them in every organization I have been part of, which suggests this is a stable property of groups rather than any particular group.`,
        () => `The ${_p('app')} ${_p('appDid')}, which is technically correct on its part and technically not what I needed from it, and I am not sure how to describe the space between those two things.`,
        () => `Nobody explained why ${_p('social')} became the format used for this situation, but everyone participates with the confidence of someone who helped design it.`,
        () => `My ${_p('device')} performed without incident for ${_p('duration')} and then ${_p('fail')} during ${_p('timing')}, which retroactively changed how I think about the reliability I had attributed to that period.`,
        () => `I have accumulated points in this ${_p('app')} loyalty program for ${_p('duration')} and the total has never crossed the minimum redemption threshold, and I am beginning to understand the structure of this arrangement.`,
        () => `The ${_p('place')} contained every listed amenity except the one I required, which I confirmed after a search I would describe as both thorough and optimistic.`,
        () => `My ${_p('transit')} ${_p('transit_did')} and I have updated my departure time in response, and the transit has updated its behavior in response to my adjustment, and this has continued.`,

    function scoreMatch(query, name) {
      const q = query.toLowerCase().trim();
      const n = name.toLowerCase().replace(/[^\w\s]/g, ' ').trim();
      if (!q) return -1;
      if (n === q) return 100;
      if (n.startsWith(q)) return 80;
      if (n.includes(q)) return 60;
      const qTokens = q.split(/\s+/).filter(Boolean);
      const hits = qTokens.filter(t => n.includes(t));
      if (hits.length === qTokens.length) return 40;
      if (hits.length > 0) return 20 * (hits.length / qTokens.length);
      return -1;
    }

    const fmt = s => {
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return h > 0
        ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    const fmtDown = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

    function parseTimeToTs(str) {
      const m = str.trim().match(/^(\d{1,2}):(\d{2})\s*(am|pm)?$/i);
      if (!m) return null;
      let h = parseInt(m[1]); const min = parseInt(m[2]); const ap = m[3]?.toLowerCase();
      if (ap === 'pm' && h !== 12) h += 12;
      if (ap === 'am' && h === 12) h = 0;
      if (h < 0 || h > 23 || min < 0 || min > 59) return null;
      const d = new Date(); d.setHours(h, min, 0, 0);
      if (d > Date.now()) d.setDate(d.getDate() - 1);
      return d.getTime();
    }

    // Shared AudioContext — created once on first user gesture so browsers don't suspend it
    let _audioCtx = null;
    function getAudioCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
      return _audioCtx;
    }
    // Unlock on first interaction
    document.addEventListener('click', getAudioCtx, { once: true });
    document.addEventListener('keydown', getAudioCtx, { once: true });

    function playSound(type, enabled) {
      if (!enabled) return;
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        const t = ctx.currentTime;
        g.gain.setValueAtTime(0.8, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        if (type === 'priming') {
          osc.frequency.setValueAtTime(523, t);
          osc.frequency.linearRampToValueAtTime(659, t + 0.2);
        } else if (type === 'triggering') {
          osc.frequency.setValueAtTime(523, t);
          osc.frequency.setValueAtTime(659, t + 0.12);
          osc.frequency.setValueAtTime(784, t + 0.25);
        } else if (type === 'sentence') {
          osc.frequency.setValueAtTime(880, t);
          osc.frequency.exponentialRampToValueAtTime(1100, t + 0.1);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
        } else if (type === 'caught') {
          [392,523,659,784].forEach((f,i) => osc.frequency.setValueAtTime(f, t + i*0.1));
        }
        osc.start(t); osc.stop(t + 0.7);
      } catch(_) {}
    }

    }

    async function computeHistogram(src, crossOrigin) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        if (crossOrigin) img.crossOrigin = 'anonymous';
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = c.height = 32;
          const ctx = c.getContext('2d');
          try {
            ctx.drawImage(img, 0, 0, 32, 32);
            const { data } = ctx.getImageData(0, 0, 32, 32);
            const hist = new Float32Array(512);
            let total = 0;
            for (let i = 0; i < data.length; i += 4) {
              if (data[i+3] < 10) continue;
              hist[Math.floor(data[i]/32)*64 + Math.floor(data[i+1]/32)*8 + Math.floor(data[i+2]/32)]++;
              total++;
            }
            if (total > 0) for (let i = 0; i < hist.length; i++) hist[i] /= total;
            resolve(hist);
          } catch(e) { reject(e); }
        };
        img.onerror = reject;
        img.src = src;
      });
    }

    // Histogram intersection: higher = better match (more robust than L1 for color matching)
    function histIntersect(h64, ref) {
      let s = 0;
      for (let i = 0; i < 64; i++) s += Math.min(h64[i], ref[i] / 1000);
      return s;
    }

    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); }
      catch(_) {
        const el = document.createElement('textarea');
        el.value = text; el.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(el); el.select(); document.execCommand('copy');
        document.body.removeChild(el);
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       SHARED COMPONENTS
    ═══════════════════════════════════════════════════════════════ */
    function addRipple(e) {
      const btn = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height) * 1.5;
      const x = e.clientX - rect.left - size / 2;
      const y = e.clientY - rect.top  - size / 2;
      const el = document.createElement('span');
      el.className = 'ripple';
      el.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
      btn.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function CopyButton({ text, label = 'Copy', block = false }) {
      const [done, setDone] = useState(false);
      const handle = async e => {
        if (!text) return;
        addRipple(e);
        await copyText(text);
        setDone(true); setTimeout(() => setDone(false), 1700);
      };
      return (
        <button onClick={handle}
          className={`btn btn-copy px-4 py-2 text-xs ${block ? 'w-full py-2.5' : ''} ${done ? 'copied' : ''}`}>
          {done ? '✓ Copied!' : `⎘ ${label}`}
        </button>
      );
    }

    function CalculatorTab() {
      const [text, setText] = useState('');
      const [preview, setPreview] = useState(null); // null | [{name, row}]
      const [addQ, setAddQ] = useState('');

      const CALC_ABBR = {'ko':'kingdom of','e':'empire','r':'republic of','d':'dynasty','k':'kingdom','u':'union','c':'confederation'};

      function expandInput(s) {
        return s.replace(/\b([a-z]+)\b/gi, function(w){ return CALC_ABBR[w.toLowerCase()] || w; });
      }

      function doMatch() {
        var expanded = expandInput(text);
        var names = [];
        for (var i = 0; i < BALL_SPECIALS.length; i++) names.push(BALL_SPECIALS[i][0]);
        var result = matchBalls(expanded, names);
        var rows = [];
        for (var j = 0; j < result.matched.length; j++) {
          var name = result.matched[j];
          var row = null;
          for (var k = 0; k < BALL_SPECIALS.length; k++) {
            if (BALL_SPECIALS[k][0] === name) { row = BALL_SPECIALS[k]; break; }
          }
          if (row) rows.push({name: name, row: row});
        }
        setPreview(rows);
        setAddQ('');
      }

      function addBall(name) {
        for (var i = 0; i < preview.length; i++) { if (preview[i].name === name) return; }
        var row = null;
        for (var k = 0; k < BALL_SPECIALS.length; k++) {
          if (BALL_SPECIALS[k][0] === name) { row = BALL_SPECIALS[k]; break; }
        }
        if (row) setPreview(preview.concat([{name: name, row: row}]));
        setAddQ('');
      }

      function removeBall(name) {
        setPreview(preview.filter(function(b){ return b.name !== name; }));
      }

      var addSuggestions = [];
      if (addQ.trim()) {
        var lq = addQ.trim().toLowerCase();
        var scored = [];
        for (var i = 0; i < BALL_SPECIALS.length; i++) {
          var s = scoreMatch(lq, BALL_SPECIALS[i][0]);
          if (s >= 0) scored.push({name: BALL_SPECIALS[i][0], score: s});
        }
        scored.sort(function(a,b){ return b.score - a.score; });
        addSuggestions = scored.slice(0, 8);
      }

      if (preview === null) {
        return (
          <div className="p-3 space-y-3">
            <p className="text-xs text-slate-600">Paste ball names — any format, abbreviations ok (e.g. "brit e", "ko scotland").</p>
            <textarea className="inp w-full text-sm resize-none" rows={6}
              placeholder={"Roman Empire, British Empire\nko scotland; soviet u\nbrit e, mongol e"}
              value={text} onChange={function(e){ setText(e.target.value); }}
              style={{fontFamily:'inherit'}} />
            <button onClick={doMatch} className="btn w-full py-2 text-xs font-semibold"
                    style={{background:'var(--indigo-dim)',border:'1px solid rgba(99,102,241,.4)',color:'#A78BFA',
                            opacity:text.trim()?1:0.4}}>
              ✨ Match balls
            </button>
          </div>
        );
      }

      var sums = {};
      var normalSum = 0;
      for (var bi = 0; bi < preview.length; bi++) {
        var brow = preview[bi].row;
        var bname = preview[bi].name;
        for (var si = 0; si < SPECIAL_KEYS.length; si++) {
          var val = brow[si + 1];
          if (val === null) continue;
          var key = SPECIAL_KEYS[si];
          if (!sums[key]) sums[key] = {key: key, label: SPECIAL_LABELS[key], sum: 0, count: 0};
          sums[key].sum += parseFloat(val);
          sums[key].count++;
        }
        var tv = TRADE_VALUES.find(function(x){ return x.name === bname; });
        if (tv) normalSum += parseFloat(tv.value) || 0;
      }
      var totalChips = Object.values(sums).sort(function(a,b){ return b.sum - a.sum; });

      return (
        <div className="p-3 space-y-3">
          <div className="flex items-center gap-2">
            <button onClick={function(){ setPreview(null); }}
                    className="btn px-3 py-1 text-xs text-slate-500"
                    style={{background:'var(--s2)',border:'1px solid var(--border)'}}>← Back</button>
            <span className="text-xs text-slate-500">{preview.length} ball{preview.length!==1?'s':''} matched</span>
          </div>

          <div className="space-y-1.5">
            {preview.map(function(b) {
              var specials = [];
              for (var si = 0; si < SPECIAL_KEYS.length; si++) {
                var v = b.row[si + 1];
                if (v !== null) specials.push({key: SPECIAL_KEYS[si], label: SPECIAL_LABELS[SPECIAL_KEYS[si]], value: v});
              }
              var tv = TRADE_VALUES.find(function(x){ return x.name === b.name; });
              return (
                <div key={b.name} className="px-3 py-2 rounded-xl" style={{background:'var(--s2)'}}>
                  <div className="flex items-center gap-2 mb-1.5">
                    <span className="text-emerald-400 text-xs">✓</span>
                    <span className="text-xs font-semibold text-white flex-1">{b.name}</span>
                    {tv && <span className="text-xs text-slate-500">{tv.value}</span>}
                    <button onClick={function(){ removeBall(b.name); }}
                            className="text-xs text-slate-600 hover:text-red-400">✕</button>
                  </div>
                  {specials.length > 0
                    ? <div className="flex flex-wrap gap-1">
                        {specials.map(function(s) {
                          var vc = specialChipColor(s.value);
                          return (
                            <span key={s.key} className="inline-flex items-center text-xs font-medium px-2 py-0.5 rounded-lg border"
                                  style={{background:vc.bg,borderColor:vc.border,color:vc.color}}>
                              {s.label}: {s.value}
                            </span>
                          );
                        })}
                      </div>
                    : <p className="text-xs text-slate-600">No special values</p>
                  }
                </div>
              );
            })}
          </div>

          <div>
            <input className="inp text-xs w-full" placeholder="+ Add a ball manually…"
                   value={addQ} onChange={function(e){ setAddQ(e.target.value); }} />
            {addSuggestions.length > 0 && (
              <div className="mt-1 rounded-lg overflow-hidden" style={{background:'var(--s1)',border:'1px solid var(--border)'}}>
                {addSuggestions.map(function(r) {
                  var already = preview.some(function(b){ return b.name === r.name; });
                  return (
                    <button key={r.name} className="w-full text-left px-3 py-1.5 text-xs hover:bg-white/5"
                            style={{color: already ? '#34d399' : 'white'}}
                            onClick={function(){ addBall(r.name); }}>
                      {r.name}{already ? ' ✓' : ''}
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {preview.length > 0 && (
            <div className="rounded-xl p-3" style={{background:'var(--s2)',border:'1px solid var(--border)'}}>
              <p className="text-xs font-semibold text-white mb-2">Total — {preview.length} ball{preview.length!==1?'s':''}</p>
              {normalSum > 0 && (
                <div className="mb-2">
                  <span className="text-xs font-semibold px-2.5 py-1 rounded-lg border"
                        style={{background:'rgba(245,158,11,.12)',borderColor:'rgba(245,158,11,.35)',color:'#fcd34d'}}>
                    {+normalSum.toPrecision(3)} T1s
                  </span>
                </div>
              )}
              <div className="flex flex-wrap gap-2">
                {totalChips.map(function(t) {
                  var vc = specialChipColor(String(t.sum));
                  return (
                    <div key={t.key} className="flex flex-col items-center gap-0.5">
                      <span className="inline-flex items-center text-xs font-medium px-2 py-0.5 rounded-lg border"
                            style={{background:vc.bg,borderColor:vc.border,color:vc.color}}>
                        {t.label}: {+t.sum.toPrecision(4)}
                      </span>
                      <span className="text-xs text-slate-600">{t.count}/{preview.length}</span>
                    </div>
                  );
                })}
              </div>
            </div>

        try {
          const hist512 = await computeHistogram(url, false);
          // Re-bucket 8-bin histogram to 4-bin (64 bins) to match BALL_HISTOGRAMS
          const h64 = new Array(64).fill(0);
          for (let i = 0; i < 512; i++) {
            const r4 = Math.floor(Math.floor(i / 64) / 2);
            const g4 = Math.floor(Math.floor((i % 64) / 8) / 2);
            const b4 = Math.floor((i % 8) / 2);
            h64[r4 * 16 + g4 * 4 + b4] += hist512[i];
          }
          const newScores = {};
          for (const [name, ref] of Object.entries(BALL_HISTOGRAMS)) {
            newScores[name] = histIntersect(h64, ref);
          }
          setScores(newScores);
          const sorted = Object.entries(newScores).sort((a,b)=>b[1]-a[1]);

    /* ═══════════════════════════════════════════════════════════════
       CLIENT-SIDE BALL MATCHER
    ═══════════════════════════════════════════════════════════════ */
    const slugify = s => s.toLowerCase().replace(/[^a-z]/g, '');

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({length: m+1}, (_, i) =>
        Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
      for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
          dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      return dp[m][n];
    }

    function matchBalls(inputText, balls) {
      const ABBREV = { usa:'unitedstates', uk:'unitedkingdom', uae:'unitedarabemirates', drc:'democraticrepublicofthecongo', ussr:'sovietunion', gb:'greatbritain', prc:'china', roc:'taiwan', nz:'newzealand', sa:'southafrica', sk:'southkorea', nk:'northkorea', ukrainessr:'ukrainiansovietsocialistrepublic', ukrainianssr:'ukrainiansovietsocialistrepublic', byelorussiassr:'byelorussiansovietsocialistrepublic', belarusssr:'byelorussiansovietsocialistrepublic', bssr:'byelorussiansovietsocialistrepublic', rsfsr:'russiansovietfederativesocialistrepublic', stlucia:'saintlucia', saintlucia:'saintlucia', stkitts:'saintkittsandnevis', stkittsandnevs:'saintkittsandnevis', stvincent:'saintvincentandthegrenadines', stmartin:'sintmaarten', bosnaandherzegovina:'bosnia', bosniaherzegovina:'bosnia', bih:'bosnia' };
      const slugIndex = {};
      for (const name of balls) slugIndex[slugify(name)] = name;

      // strip flag emojis, parse :emoji1: → emoji, lowercase
      const parsed = inputText
        .replace(/[\u{1F1E6}-\u{1F1FF}]{2}/gu, ' ')
        .replace(/:([a-z0-9_]+):/gi, (_, n) => n.replace(/[_0-9]/g, '') + ' ')
        .toLowerCase()
        .replace(/[^\w\s]/g, ' ');

      const raw = [...new Set(
        parsed.split(/\s+/).map(t => t.replace(/\d+$/, '')).filter(t => t.length > 1)
      )];

      const matched = new Set();
      const unmatched = [];

      for (const tok of raw) {
        const rawSlug = slugify(tok);
        const sl = ABBREV[tok] || ABBREV[rawSlug] || rawSlug;
        let found = false;

        // exact slug
        if (slugIndex[sl]) { matched.add(slugIndex[sl]); found = true; }

        // containment: input slug wraps ball slug (secondfrenchempire ⊃ frenchempire)
        if (!found && sl.length >= 8) {
          for (const name of balls) {
            const bs = slugify(name);
            if (bs.length >= 7 && sl.includes(bs)) { matched.add(name); found = true; break; }
          }
        }

        // reverse containment: ball slug wraps input slug (saotomeandprincipe ⊃ saotome)
        if (!found && sl.length >= 7) {
          for (const name of balls) {
            const bs = slugify(name);
            if (bs.includes(sl)) { matched.add(name); found = true; break; }
          }
        }

        // best-match fallback: pick closest ball by Levenshtein across all balls
        if (!found && sl.length >= 3) {
          let bestName = null, bestDist = Infinity;
          for (const name of balls) {
            const dist = levenshtein(sl, slugify(name));
            if (dist < bestDist) { bestDist = dist; bestName = name; }
          }
          if (bestName) { matched.add(bestName); found = true; }
        }
      }

      return { matched: [...matched], unmatched: [] };
    }

                  <span className={`text-xs px-1.5 py-0.5 rounded border ${rarityStyle(b.rarity)}`} style={{fontSize:'0.6rem'}}>{b.rarity}</span>

    function App() {
      // ── Load persisted ──────────────────────────────────────────
      const saved = useMemo(() => { try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch(_){return{};} }, []);

      // ── State ───────────────────────────────────────────────────
      const [lastCatch,   setLastCatch]   = useState(() => saved.lastCatch || Date.now());
      const [elapsed,     setElapsed]     = useState(0);
      const [phase,       setPhase]       = useState('RESTING');
      const [standby,     setStandby]     = useState(false);

      const [serverName,  setServerName]  = useState(() => saved.serverName  || '');
      const [memberCount, setMemberCount] = useState(() => saved.memberCount || 'medium');
      const [sentSize,    setSentSize]    = useState(() => saved.sentSize     || 'medium');
      const [sentInterval,setSentInterval]= useState(() => saved.sentInterval || 60);
      const [sound,       setSound]       = useState(() => saved.sound !== false);
      const [notifs,      setNotifs]      = useState(() => saved.notifs === true && typeof Notification !== 'undefined' && Notification.permission === 'granted');

      const [sentence,    setSentence]    = useState('');
      const [command,     setCommand]     = useState('');
      const [tick,        setTick]        = useState(60);

      const [showBalls,      setShowBalls]      = useState(false);
      const [showSync,       setShowSync]       = useState(false);
      const [showIdentifier, setShowIdentifier] = useState(false);
      const [showValue,      setShowValue]      = useState(false);
      const [toast,          setToast]          = useState(null); // {msg, type, key}
      const [notifOk,     setNotifOk]     = useState(typeof Notification !== 'undefined');
      const [swStatus,    setSwStatus]    = useState('unknown'); // 'unknown'|'active'|'unavailable'

      const [collection, setCollection] = useState(() => {
        try { return JSON.parse(localStorage.getItem(LS_COLLECTION)||'{}'); }
        catch(_) { return {}; }
      });
      const [autoCopy,   setAutoCopy]   = useState(() => {
        try { return localStorage.getItem('bdx-autocopy') === 'true'; } catch(_){ return false; }
      });

      // ── Refs (no re-render needed, read inside interval) ────────
      const lastSentR = useRef(0); // wall-clock ms of last sentence (0 = fire immediately)
      const cmdIdxR  = useRef(0);
      const cmdTickR = useRef(randCmdInterval()); // seconds until next command
      const prevPhR  = useRef('RESTING');
      const soundR   = useRef(sound);
      const notifR   = useRef(notifs);
      const standbyR = useRef(standby);
      const sizeR        = useRef(sentSize);
      const sentIntervalR = useRef(sentInterval);
      const lastIdentifiedNameR = useRef('');
      const autoCopyR           = useRef(autoCopy);

      useEffect(() => { soundR.current   = sound;    }, [sound]);
      useEffect(() => { notifR.current   = notifs;   }, [notifs]);
      useEffect(() => { standbyR.current = standby;  }, [standby]);
      useEffect(() => { sizeR.current         = sentSize;     }, [sentSize]);
      useEffect(() => { sentIntervalR.current = sentInterval; }, [sentInterval]);
      useEffect(() => { autoCopyR.current  = autoCopy;  }, [autoCopy]);

      // ── Service Worker registration ──────────────────────────────
      useEffect(() => {
        if (!('serviceWorker' in navigator)) { setSwStatus('unavailable'); return; }
        navigator.serviceWorker.register('/sw.js')
          .then(() => {
            setSwStatus('active');
            // Controller may not exist yet on first install — wait for it
            if (navigator.serviceWorker.controller) {
              navigator.serviceWorker.controller.postMessage({ type: 'SYNC', lastCatch, sentInterval: sentIntervalR.current, lastSent: lastSentR.current });
            } else {
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                navigator.serviceWorker.controller?.postMessage({ type: 'SYNC', lastCatch, sentInterval: sentIntervalR.current, lastSent: lastSentR.current });
              }, { once: true });
            }
          })
          .catch(() => setSwStatus('unavailable'));
      }, []); // eslint-disable-line react-hooks/exhaustive-deps

      // ── Keep SW in sync when lastCatch changes ───────────────────
      useEffect(() => {
        if (swStatus === 'active') {
          navigator.serviceWorker.controller?.postMessage({ type: 'SYNC', lastCatch, sentInterval: sentIntervalR.current, lastSent: lastSentR.current });
        }
      }, [lastCatch, swStatus]);

      // ── Hand off between page timer ↔ SW timer ───────────────────
      // When tab hides: SW takes over.  When tab shows: SW stops, page runs.
      useEffect(() => {
        if (swStatus !== 'active') return;
        const handle = () => {
          const ctrl = navigator.serviceWorker.controller;
          if (!ctrl) return;
          if (document.hidden) {
            ctrl.postMessage({ type: 'SYNC', lastCatch, sentInterval: sentIntervalR.current, lastSent: lastSentR.current });
          } else {
            ctrl.postMessage({ type: 'STOP' });
          }
        };
        document.addEventListener('visibilitychange', handle);
        return () => document.removeEventListener('visibilitychange', handle);
      }, [lastCatch, swStatus]);

      // ── Persist ─────────────────────────────────────────────────
      useEffect(() => {
        try { localStorage.setItem(LS_KEY, JSON.stringify({ lastCatch, serverName, memberCount, sentSize, sentInterval, sound, notifs })); } catch(_) {}
      }, [lastCatch, serverName, memberCount, sentSize, sentInterval, sound, notifs]);
      useEffect(() => {
        try { localStorage.setItem(LS_COLLECTION, JSON.stringify(collection)); } catch(_) {}
      }, [collection]);
      useEffect(() => {
        try { localStorage.setItem('bdx-autocopy', String(autoCopy)); } catch(_) {}
      }, [autoCopy]);

      // ── Main timer ──────────────────────────────────────────────
      useEffect(() => {
        const el0 = Math.floor((Date.now() - lastCatch) / 1000);
        let initPh = 'RESTING';
        if (el0 >= TRIGGERING_START) initPh = 'TRIGGERING';
        else if (el0 >= PRIMING_START) initPh = 'PRIMING';
        prevPhR.current  = initPh;
        lastSentR.current = 0; // fire sentence immediately on restore if in active phase
        cmdIdxR.current  = 0;
        cmdTickR.current = randCmdInterval();

        const id = setInterval(() => {
          const el = Math.floor((Date.now() - lastCatch) / 1000);
          setElapsed(el);

          let ph = 'RESTING';
          if (el >= TRIGGERING_START)      ph = 'TRIGGERING';
          else if (el >= PRIMING_START) ph = 'PRIMING';
          setPhase(ph);

          // Phase transition
          if (ph !== prevPhR.current) {
            if (!standbyR.current) {
              if (ph === 'PRIMING') {
                playSound('priming', soundR.current);
                if (notifR.current) fireNotif('🟡 Priming Started', 'Send a sentence now to prime the spawn!');
                setToast({ msg: '🟡 Priming started — send a sentence!', type: 'prime', key: Date.now() });
              } else if (ph === 'TRIGGERING') {
                playSound('triggering', soundR.current);
                if (notifR.current) fireNotif('🟢 TRIGGERING!', 'Ball window is OPEN. Send now!');
                setToast({ msg: '🟢 TRIGGERING — send now!', type: 'trig', key: Date.now() });
              }
            }
            if (ph === 'PRIMING' || ph === 'TRIGGERING') lastSentR.current = 0; // fire immediately on transition
            prevPhR.current = ph;
          }

          // Sentence refresh in PRIMING + TRIGGERING — wall-clock based to survive throttling
          if (ph === 'PRIMING' || ph === 'TRIGGERING') {
            const now = Date.now();
            const interval = sentIntervalR.current;
            const age = lastSentR.current === 0 ? 999999 : (now - lastSentR.current) / 1000;
            if (age >= interval) {
              const s = generateSentence(sizeR.current);
              setSentence(s);
              if (autoCopyR.current) navigator.clipboard.writeText(s).catch(()=>{});
              if (!standbyR.current) {
                playSound('sentence', soundR.current);
                if (notifR.current && ph === 'TRIGGERING') fireNotif('🟢 Send Now!', s);
                setToast({ msg: (ph === 'TRIGGERING' ? '🟢 ' : '🟡 ') + s, type: ph === 'TRIGGERING' ? 'trig' : 'prime', key: Date.now() });
              }
              lastSentR.current = now;
              setTick(interval);
            } else {
              setTick(Math.ceil(interval - age));
            }
          }

          // Command refresh (every 15–30 min in TRIGGERING only)
          if (ph === 'TRIGGERING') {
            cmdTickR.current--;
            if (cmdTickR.current <= 0) {
              const c = CMDS[cmdIdxR.current % CMDS.length];
              cmdIdxR.current++;
              setCommand(c);
              if (!standbyR.current) {
                playSound('sentence', soundR.current);
                if (notifR.current) fireNotif('🟢 Use Command Now!', c);
              }
              cmdTickR.current = randCmdInterval();
            }
          }
        }, 1000);

        return () => clearInterval(id);
      }, [lastCatch]);


      // ── Handlers ────────────────────────────────────────────────
      const reset = useCallback((ts = Date.now()) => {
        setLastCatch(ts); setSentence(''); setCommand('');
        setTick(sentIntervalR.current); lastSentR.current = 0; cmdIdxR.current = 0; cmdTickR.current = randCmdInterval();
      }, []);

      const caught = useCallback(() => { playSound('caught', soundR.current); reset(); }, [reset]);
      const miss   = useCallback(() => reset(), [reset]);
      const sync   = useCallback(ts => reset(ts), [reset]);

      const toggleNotifs = useCallback(async () => {
        if (notifs) { setNotifs(false); return; }
        if (typeof Notification === 'undefined') return;
        const p = await Notification.requestPermission();
        if (p === 'granted') setNotifs(true);
      }, [notifs]);

      // ── Derived ─────────────────────────────────────────────────
      const showContent = phase === 'PRIMING' || phase === 'TRIGGERING';
      const showCmd     = phase === 'TRIGGERING';

      const coolPct  = Math.min(100, (elapsed / PRIMING_START) * 100);
      const primePct = phase === 'PRIMING' ? Math.min(100, ((elapsed - PRIMING_START) / (TRIGGERING_START - PRIMING_START)) * 100) : 0;
      const sentPct  = Math.min(100, ((60 - tick) / 60) * 100);
      const restDown = Math.max(0, PRIMING_START - elapsed);
      const primDown = Math.max(0, TRIGGERING_START - elapsed);

      const PHASE_CFG = {
        RESTING:    { label:'Cooling Down',                  icon:'⬛', color:'#64748B', badge:'text-slate-400 bg-slate-500/10 border-slate-500/20',   bg:'' },
        PRIMING:    { label:'Priming — Send a Sentence',     icon:'🟡', color:'#F59E0B', badge:'text-amber-400 bg-amber-500/10 border-amber-500/20',    bg:'phase-prime-bg' },
        TRIGGERING: { label:'TRIGGERING — SEND NOW',         icon:'🟢', color:'#10B981', badge:'text-emerald-400 bg-emerald-500/10 border-emerald-500/20', bg:'phase-trig-bg' },
      };
      const cfg = PHASE_CFG[phase] || PHASE_CFG.RESTING;

      /* ── RENDER ─────────────────────────────────────────────────*/
      return (
        <div className={`flex flex-col h-screen overflow-hidden relative ${cfg.bg}`} style={{zIndex:1}}>

          {/* Standby overlay */}
          {standby && (
            <div className="fixed inset-0 z-40 flex flex-col items-center justify-center anim-fade-in"
                 style={{background:'rgba(0,0,0,.78)',backdropFilter:'blur(8px)'}}>
              <div className="text-5xl mb-3 opacity-20">💤</div>
              <p className="text-lg font-semibold text-slate-300 mb-1">Standby Mode</p>
              <p className="text-sm text-slate-600 mb-2">Notifications silenced. Timer still running.</p>
              <div className="font-mono text-5xl font-bold text-white/20 mb-6">{fmt(elapsed)}</div>
              <button onClick={()=>setStandby(false)} className="btn px-7 py-3 text-sm text-white font-semibold"
                      style={{background:'var(--indigo)',border:'1px solid rgba(99,102,241,.4)'}}>▶ Wake Up</button>
            </div>
          )}

          {/* ── HEADER ──────────────────────────────────────────── */}
          <header className="flex-shrink-0 flex items-center justify-between px-5 py-2.5"
                  style={{background:'rgba(4,4,10,0.7)',borderBottom:'1px solid rgba(139,92,246,0.18)',backdropFilter:'blur(28px)',zIndex:10,boxShadow:'0 1px 0 rgba(139,92,246,0.08)'}}>
            <div className="flex items-center gap-2.5">
              <div className="w-7 h-7 rounded-lg flex items-center justify-center text-sm font-bold"
                   style={{background:'linear-gradient(135deg,#7C3AED,#6366F1)',boxShadow:'0 0 14px rgba(124,58,237,0.5)'}}>⚡</div>
              <span className="text-sm font-bold" style={{background:'linear-gradient(90deg,#A78BFA,#22D3EE)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>BallsDex</span>
              <span className="text-sm font-medium" style={{color:'rgba(255,255,255,0.25)'}}>Spawn Commander</span>
              {serverName && <span className="text-xs hidden sm:inline" style={{color:'rgba(255,255,255,0.2)'}}>· {serverName}</span>}
            </div>
            <div className="flex items-center gap-1.5">
              <span className={`hidden sm:inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full border ${cfg.badge}`}>
                <span className={`phase-dot ${phase !== 'RESTING' ? 'pulsing' : ''}`} style={{background: cfg.color}} />
                {cfg.label}
              </span>
              <button onClick={()=>setShowBalls(true)} className="btn px-3 py-1.5 text-xs text-slate-500 hover:text-white"
                      style={{background:'var(--s2)',border:'1px solid var(--border)'}}>📖</button>
              <button onClick={()=>setShowValue(true)} className="btn px-3 py-1.5 text-xs text-slate-500 hover:text-white"
                      style={{background:'var(--s2)',border:'1px solid var(--border)'}}>💰</button>
              <button onClick={()=>setShowIdentifier(true)} className="btn px-3 py-1.5 text-xs text-slate-500 hover:text-white"
                      style={{background:'var(--s2)',border:'1px solid var(--border)'}}>🔍</button>

                      style={{background:standby?'var(--indigo-dim)':'var(--s2)',border:`1px solid ${standby?'rgba(99,102,241,.3)':'var(--border)'}`}}>
                {standby ? '▶ Wake' : '💤 Rest'}
              </button>

          </header>

          {/* ── BODY ────────────────────────────────────────────── */}
          <div className="flex flex-1 overflow-hidden" style={{position:'relative',zIndex:1}}>

            {/* LEFT PANEL */}
            <aside className="w-80 xl:w-96 flex-shrink-0 flex flex-col overflow-y-auto border-r gap-3 p-3"
                   style={{borderColor:'rgba(139,92,246,0.12)',background:'rgba(6,5,18,0.55)'}}>

              {/* Phase Clock */}
              <section className={`glass rounded-xl p-4 card-lift text-center ${phase==='TRIGGERING'?'trig-ring':''}`}
                       style={{boxShadow: phase==='TRIGGERING'?'0 0 0 1px rgba(16,185,129,0.3),0 4px 20px rgba(16,185,129,0.1)':phase==='PRIMING'?'0 0 0 1px rgba(245,158,11,0.25),0 4px 20px rgba(245,158,11,0.08)':'0 0 0 1px rgba(139,92,246,0.15),0 4px 20px rgba(0,0,0,0.3)'}}>
                <div className={`inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full border mb-2 ${cfg.badge}`}>
                  <span className={`phase-dot ${phase !== 'RESTING' ? 'pulsing' : ''}`} style={{background:cfg.color}} />
                  <span className="uppercase tracking-widest text-xs">{cfg.label}</span>
                </div>
                <div className="font-mono font-bold leading-none mb-1"
                     style={{fontSize:'clamp(2.4rem,4vw,3.2rem)',letterSpacing:'0.08em',
                             color:phase==='TRIGGERING'?'#34D399':phase==='PRIMING'?'#FCD34D':'#E2E8F0',
                             textShadow:phase==='TRIGGERING'?'0 0 24px rgba(52,211,153,0.7)':phase==='PRIMING'?'0 0 24px rgba(252,211,77,0.6)':'0 0 30px rgba(139,92,246,0.25)'}}>
                  {fmt(elapsed)}
                </div>
                <p className="uppercase tracking-widest mb-3" style={{color:'var(--muted)',letterSpacing:'0.12em',fontSize:'0.6rem'}}>Time Since Last Catch</p>
                {phase==='RESTING'    && <Bar pct={coolPct}  color="linear-gradient(90deg,#6366F1,#8B5CF6)" glow="rgba(139,92,246,0.7)"  label="Cooling down"  sub={`Priming in ${fmtDown(restDown)}`} />}
                {phase==='PRIMING'    && <Bar pct={primePct} color="linear-gradient(90deg,#F59E0B,#F97316)" glow="rgba(245,158,11,0.8)"  label="Priming phase" sub={`Trigger in ${fmtDown(primDown)}`} />}
                {phase==='TRIGGERING' && <Bar pct={sentPct}  color="linear-gradient(90deg,#10B981,#34D399)" glow="rgba(16,185,129,0.8)"  label="Next sentence" sub={`${tick}s`} />}
              </section>

              {/* Server Info */}
              <section className="glass rounded-xl p-3.5 card-lift">
                <p className="section-label">Server</p>
                <div className="space-y-2">
                  <div>
                    <label className="block text-xs text-slate-600 mb-1">Name / ID</label>
                    <input className="inp text-xs" placeholder="My Discord Server" value={serverName} onChange={e=>setServerName(e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-xs text-slate-600 mb-1">Members</label>
                    <select className="inp text-xs" value={memberCount} onChange={e=>setMemberCount(e.target.value)}>
                      <option value="small">Small (1–5)</option>
                      <option value="medium">Medium (6–20)</option>
                      <option value="large">Large (21–100+)</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs text-slate-600 mb-1">Sentence Length</label>
                    <select className="inp text-xs" value={sentSize} onChange={e=>setSentSize(e.target.value)}>
                      <option value="small">Short</option>
                      <option value="medium">Medium</option>
                      <option value="large">Long</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs text-slate-600 mb-1">Sentence Interval (s)</label>
                    <input type="number" min="5" max="300" className="inp text-xs" value={sentInterval}
                           onChange={e => setSentInterval(Math.max(5, Math.min(300, Number(e.target.value) || 60)))} />
                  </div>
                </div>
              </section>

              {/* Actions */}
              <section className="glass rounded-xl p-3.5 card-lift">
                <p className="section-label">Actions</p>
                <div className="space-y-2">
                  <button onClick={e => { addRipple(e); caught(); }} className="btn btn-caught w-full py-4 text-base font-bold">
                    ✅ CAUGHT!
                  </button>
                  <button onClick={e => { addRipple(e); miss(); }} className="btn btn-miss w-full py-2.5 text-sm font-semibold">
                    ❌ MISS!
                  </button>
                  <button onClick={()=>setShowSync(true)} className="btn btn-ghost w-full py-2.5 text-xs font-medium">
                    🕐 Sync Last Catch
                  </button>
                </div>
              </section>

              {/* Settings */}
              <section className="glass rounded-xl p-3.5 card-lift">
                <p className="section-label">Settings</p>
                <div className="space-y-1.5">
                  {[
                    { label:'Sound',          on:sound,  toggle:()=>setSound(!sound)  },
                    ...(notifOk ? [{ label:'Browser Alerts', on:notifs, toggle:toggleNotifs }] : []),
                  ].map(({label,on,toggle}) => (
                    <div key={label} className="toggle-row" onClick={toggle}>
                      <span className="text-xs text-slate-400">{label}</span>
                      <div className={`toggle-track ${on ? 'on' : 'off'}`}>
                        <div className="toggle-thumb" />
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              <div className="flex-1" />
              {swStatus === 'active' && (
                <p className="text-xs text-center text-emerald-800 pb-1">● Background alerts active</p>
              )}
              {swStatus === 'unavailable' && (
                <p className="text-xs text-center text-amber-900 pb-1 leading-relaxed">
                  Background alerts need localhost.<br/>
                  Run: <span className="font-mono">npx serve .</span>
                </p>
              )}
              <p className="text-xs text-center text-slate-800 pb-1">v2 · data persisted locally</p>
            </aside>

            {/* RIGHT PANEL */}
            <main className="flex-1 flex flex-col overflow-hidden p-4 gap-3">

              {/* Content box */}
              {showContent && (
                <section className="glass rounded-xl p-4 anim-slide-up">
                  <div className="flex items-center justify-between mb-3">
                    <p className="text-xs font-semibold uppercase tracking-widest text-slate-600">
                      {showCmd ? '🟢 Send This Now' : '🟡 Send This Sentence'}
                    </p>
                    <div className="flex items-center gap-2">
                      <button onClick={()=>setAutoCopy(v=>!v)}
                              className="btn px-2 py-1 text-xs flex items-center gap-1"
                              style={{background:autoCopy?'var(--indigo-dim)':'var(--s2)',
                                      border:`1px solid ${autoCopy?'rgba(99,102,241,.4)':'var(--border)'}`,
                                      color:autoCopy?'#818cf8':'var(--muted)'}}
                              title="Auto-copy new sentences to clipboard">
                        📋 Auto
                      </button>
                      <span className="text-xs font-mono text-slate-700">Next in {tick}s</span>
                    </div>
                  </div>

                  {sentence ? (
                    <div className="space-y-3">
                      <p className="text-sm text-white leading-relaxed">{sentence}</p>
                      <CopyButton text={sentence} label="Copy Sentence" block />

                      {showCmd && command && (
                        <div className="border-t pt-3 space-y-2" style={{borderColor:'var(--border)'}}>
                          <p className="text-xs font-semibold uppercase tracking-widest text-slate-600">Discord Command</p>
                          <div className="flex items-center gap-2 px-3 py-2.5 rounded-xl"
                               style={{background:'var(--indigo-dim)',border:'1px solid rgba(99,102,241,.2)'}}>
                            <code className="flex-1 text-sm font-mono font-bold text-indigo-300">{command}</code>
                            <CopyButton text={command} label="Copy" />
                          </div>
                        </div>
                      )}
                    </div>
                  ) : (
                    <p className="text-sm text-slate-700 italic">Generating…</p>
                  )}
                </section>
              )}

              {/* Collection */}
              <section className="glass rounded-xl flex flex-col flex-1 min-h-0 overflow-hidden">
                <CollectionTab collection={collection} setCollection={setCollection} />
              </section>

            </main>
          </div>


          {/* Toast — renders above all modals */}
          {toast && (
            <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)} />
          )}

          {/* Modals */}
          {showBalls      && <BallModal          onClose={()=>setShowBalls(false)}
                                               collection={collection}
                                               onToggleOwned={name => setCollection(prev => {
                                                 const next = {...prev};
                                                 if (next[name]) delete next[name]; else next[name] = true;
                                                 return next;
                                               })} />}
          {showSync       && <SyncModal          onClose={()=>setShowSync(false)} onSync={sync} />}
          {showValue      && <ValueModal         onClose={()=>setShowValue(false)} />}
          {showIdentifier && <IdentifierModal    onClose={()=>setShowIdentifier(false)}
                                               onIdentify={name => { lastIdentifiedNameR.current = name; }} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
